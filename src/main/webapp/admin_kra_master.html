<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BlueVibes | KRA Appraisals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

:root{
    --primary:#0f172a;
    --accent:#0284c7;
    --bg:#f1f5f9;
    --border:#e2e8f0;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */

.sidebar{
    width:280px;
    background:var(--primary);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    overflow-y:auto;
}

.sidebar-header{
    padding:2.5rem 1.5rem;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.brand-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.logo-main{
    width:100px;
}

.logo-secondary{
    width:220px;
}

.brand-name{
    font-size:1.8rem;
    font-weight:800;
    color:white;
    letter-spacing:4px;
    margin-top:10px;
}

.nav-links{
    list-style:none;
    padding:1.5rem 1rem;
    flex-grow:1;
}

.nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:0.8rem 1.2rem;
    border-radius:8px;
    color:#94a3b8;
    text-decoration:none;
    margin-bottom:0.5rem;
    transition:.3s;
    font-size:.85rem;
}

.nav-item:hover,
.nav-item.active{
    background:var(--accent);
    color:white;
}

.logout-sect{
    padding:1.5rem;
    border-top:1px solid rgba(255,255,255,0.1);
}

.logout-btn{
    color:#f87171;
    text-decoration:none;
}

/* MAIN */

.main-wrapper{
    flex-grow:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.top-header{
    height:70px;
    background:var(--primary);
    color:white;
    display:flex;
    align-items:center;
    padding:0 2rem;
}

.content-area{
    padding:2rem;
    overflow:auto;
}

/* CARD */

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    border:1px solid var(--border);
}

.page-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}

.form-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:8px;
    font-family:inherit;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0f172a;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border:1px solid #e5e7eb;
}

.btn{
    border:none;
    cursor:pointer;
    padding:10px 18px;
    border-radius:8px;
    font-weight:600;
}

.btn-primary{
    background:#0284c7;
    color:white;
}

.btn-success{
    background:#16a34a;
    color:white;
}

.btn-danger{
    background:#dc2626;
    color:white;
}

.btn-warning{
    background:#f59e0b;
    color:white;
}

.action-bar{
    display:flex;
    gap:10px;
    margin-top:20px;
}

textarea{
    min-height:60px;
}

</style>
</head>

<body>

<aside class="sidebar">

<div class="sidebar-header">
<div class="brand-container">
<img src="blueeye.png" class="logo-main">
<img src="bluedigital.png" class="logo-secondary">
</div>
<div class="brand-name">BlueVibes</div>
</div>

<nav class="nav-links">

<a href="adminhome.html" class="nav-item">
<i class="ph ph-house"></i>
Admin Dashboard
</a>

<a href="adminprofile.html" class="nav-item">
<i class="ph ph-user"></i>
My Profile
</a>

<a href="usermanagement.html" class="nav-item">
<i class="ph ph-users-three"></i>
User Management
</a>

<a href="adminreports.html" class="nav-item">
<i class="ph ph-clipboard-text"></i>
View Weekly Reports
</a>

<a href="admin_kra_master.html" class="nav-item active">
<i class="ph ph-chart-line-up"></i>
KRA Appraisals
</a>

</nav>

<div class="logout-sect">
<a href="index.html" class="logout-btn">
<i class="ph ph-power"></i>
Logout Account
</a>
</div>

</aside>

<main class="main-wrapper">

<header class="top-header">
<h2>KRA Appraisals</h2>
</header>

<div class="content-area">

<div class="card">

<div class="page-title">
KRA Definition Sheet
</div>

<div class="form-row">

<div>
<label>Assessment Year</label>
<input type="text" id="assessmentYear" value="2026-27">
</div>

</div>

<table id="kraTable">

<thead>
<tr>
<th>Objective</th>
<th>Measurement Criteria</th>
<th>Sub Activity</th>
<th>Weightage</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="kraBody">

<tr>

<td>
<textarea placeholder="Objective"></textarea>
</td>

<td>
<textarea placeholder="Measurement Criteria"></textarea>
</td>

<td>
<textarea placeholder="Sub Activity"></textarea>
</td>

<td>
<input type="number" value="5">
</td>

<td>
<button class="btn btn-danger" onclick="deleteRow(this)">
Delete
</button>
</td>

</tr>

</tbody>

</table>

<div class="action-bar">

<button class="btn btn-primary" onclick="addRow()">
+ Add Row
</button>

<button class="btn btn-success">
Save KRA
</button>

<button class="btn btn-warning">
Publish
</button>

<button class="btn btn-primary">
Export Sheet
</button>

</div>

</div>

</div>

</main>

<script>

function addRow(){

const row=`

<tr>

<td>
<textarea placeholder="Objective"></textarea>
</td>

<td>
<textarea placeholder="Measurement Criteria"></textarea>
</td>

<td>
<textarea placeholder="Sub Activity"></textarea>
</td>

<td>
<input type="number" value="5">
</td>

<td>
<button class="btn btn-danger" onclick="deleteRow(this)">
Delete
</button>
</td>

</tr>

`;

document
.getElementById("kraBody")
.insertAdjacentHTML("beforeend",row);

}

function deleteRow(btn){

const rows=document.querySelectorAll("#kraBody tr");

if(rows.length===1){
alert("At least one KRA row is required.");
return;
}

btn.closest("tr").remove();

}

</script>

</body>
</html>
