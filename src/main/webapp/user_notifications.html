<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlueVibes | Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --sidebar-width:240px;
            --primary:#0f172a;
            --accent:#0284c7;
            --bg:#f1f5f9;
            --border:#e2e8f0;
            --text:#1e293b;
            --white:#ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        
        .sidebar{
            width:var(--sidebar-width);
            background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
            display:flex;
            flex-direction:column;
            flex-shrink:0;
            overflow:hidden;
            border-right:1px solid rgba(255,255,255,0.08);
        }
        
        .sidebar-header{
            padding:18px 15px 12px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.08);
        }
        
        .brand-container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
            margin-bottom:6px;
        }
        
        .logo-main{
            width:75px;
            height:auto;
            object-fit:contain;
        }
        
        .logo-secondary{
            width:150px;
            height:auto;
            object-fit:contain;
        }
        
        .brand-name{
            font-size:1.45rem;
            font-weight:800;
            color:white;
            letter-spacing:2px;
            margin-top:5px;
            background:linear-gradient(to right,#ffffff,#94a3b8);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        
        .nav-links{
            list-style:none;
            padding:12px;
            flex-grow:1;
            overflow-y:auto;
            scrollbar-width:thin;
        }
        
        .nav-links::-webkit-scrollbar{
            width:5px;
        }
        
        .nav-links::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:10px;
        }
        
        .nav-links::-webkit-scrollbar-track{
            background:transparent;
        }
        
        .nav-item{
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 14px;
            border-radius:12px;
            color:#cbd5e1;
            text-decoration:none;
            margin-bottom:6px;
            transition:all .25s ease;
            font-size:14px;
            font-weight:500;
        }
        
        .nav-item i{
            font-size:18px;
            min-width:20px;
        }
        
        .nav-item:hover{
            background:rgba(2,132,199,.18);
            color:white;
            transform:translateX(3px);
        }
        
        .nav-item.active{
            background:#0284c7;
            color:white;
            box-shadow:0 4px 12px rgba(2,132,199,.35);
        }
        
        .logout-sect{
            padding:12px;
            border-top:1px solid rgba(255,255,255,.08);
        }
        
        .logout-btn{
            color:#f87171 !important;
            text-decoration:none;
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 14px;
            border-radius:12px;
            transition:.25s;
            font-size:14px;
        }
        
        .logout-btn:hover{
            background:rgba(239,68,68,.12);
            color:#fca5a5 !important;
        }
        
        .logout-btn i{
            font-size:18px;
        }

        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 70px; background: var(--primary); color: white; display: flex; align-items: center; padding: 0 2.5rem; }
        .content-area { padding: 2.5rem; overflow-y: auto; flex-grow: 1; }

        .wall-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; border-left: 5px solid var(--accent); transition: 0.3s; }
        .tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
        .tag-Urgent { background: #fee2e2; color: #ef4444; }
        .tag-General { background: #e0f2fe; color: #0284c7; }
        .tag-Policy { background: #fef3c7; color: #d97706; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="brand-container"><img src="blueeye.png" class="logo-main"><img src="bluedigital.png" class="logo-secondary"></div>
        <div class="brand-name">BlueVibes</div>
    </div>
    <nav class="nav-links">
        <a href="homepage.jsp" class="nav-item"><i class="ph ph-house"></i> Dashboard</a>
        <a href="LoadProfileServlet" class="nav-item"><i class="ph ph-user"></i> My Profile</a>
        <a href="attendance.html" class="nav-item"><i class="ph ph-calendar-check"></i> Attendance & Calender</a>
        <a href="weeklyreport.html" class="nav-item"><i class="ph ph-clipboard-text"></i> Weekly Status Report</a>
        <a href="user_notifications.html" class="nav-item active"><i class="ph ph-broadcast"></i> Notifications</a>
        <a href="payslips.jsp" class="nav-item"><i class="ph ph-receipt"></i> Payslips</a>
        <a href="appraisals.html" class="nav-item"><i class="ph ph-chart-line-up"></i> KRA Appraisals</a>
        <a href="know_colleagues.html" class="nav-item">
            <i class="ph ph-users-three"></i> Know Your Colleagues
        </a>
        <a href="policyview.jsp" class="nav-item"><i class="ph ph-scroll"></i> Company Policies</a>
        <a href="travelrequest.jsp" class="nav-item">
            <i class="ph ph-airplane"></i> Travel Request
        </a>
        <a href="policyview.jsp" class="nav-item"><i class="ph ph-scroll"></i> Company Policies</a>
        <a href="leavereq.html" class="nav-item"><i class="ph ph-calendar-x"></i> Leave Request</a>
    </nav>
    <div class="logout-sect">
        <a href="index.html" class="logout-btn"><i class="ph ph-power"></i> Logout Account</a>
    </div>
</aside>

<main class="main-wrapper">
    <header class="top-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Notifications</h2>
    
        <button onclick="openHistory()"
                style="padding:10px 16px;border:none;border-radius:8px;background:#0284c7;color:white;font-weight:600;cursor:pointer;">
            Notification History
        </button>
    </header>
    <div class="content-area" id="wallFeed">
        <p style="color: #94a3b8;">Fetching announcements...</p>
    </div>
</main>

<div id="historyModal"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;">

    <div style="
        width:800px;
        max-width:95%;
        max-height:80vh;
        overflow:auto;
        background:white;
        border-radius:12px;
        padding:25px;
        margin:50px auto;
    ">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h3>Notification History</h3>

            <button onclick="closeHistory()"
                    style="border:none;background:#ef4444;color:white;padding:8px 12px;border-radius:6px;cursor:pointer;">
                Close
            </button>
        </div>

        <div id="historyContent"></div>

    </div>
</div>

<script>
    let allNotifications = [];

    function loadNotifications() {
    
        fetch('BroadcastServlet')
        .then(res => res.json())
        .then(data => {
    
            allNotifications = data;
    
            const feed = document.getElementById('wallFeed');
    
            if (!data || data.length === 0) {
                feed.innerHTML = "<p>No active notifications.</p>";
                return;
            }
    
            const latestThree = data.slice(0,3);
    
            feed.innerHTML = "";
    
            latestThree.forEach(item => {
    
                feed.innerHTML += `
                    <div class="wall-card">
                        <span class="tag tag-${item.category}">
                            ${item.category}
                        </span>
    
                        <p style="font-weight:500;font-size:1.05rem;">
                            ${item.message}
                        </p>
    
                        <small style="color:#94a3b8;display:block;margin-top:15px;">
                            <i class="ph ph-clock"></i>
                            ${new Date(item.time).toLocaleString()}
                        </small>
                    </div>
                `;
            });
        });
    }
    
    function openHistory() {
    
        const modal = document.getElementById('historyModal');
        const content = document.getElementById('historyContent');
    
        modal.style.display = "block";
    
        content.innerHTML = "";
    
        allNotifications.slice(3).forEach(item => {
    
            content.innerHTML += `
                <div class="wall-card">
                    <span class="tag tag-${item.category}">
                        ${item.category}
                    </span>
    
                    <p style="font-weight:500;">
                        ${item.message}
                    </p>
    
                    <small style="color:#94a3b8;">
                        ${new Date(item.time).toLocaleString()}
                    </small>
                </div>
            `;
        });
    
        if(allNotifications.length <= 3){
            content.innerHTML =
                "<p style='color:#64748b;'>No older notifications available.</p>";
        }
    }
    
    function closeHistory() {
        document.getElementById('historyModal').style.display = "none";
    }
    
    window.onload = loadNotifications;
</script>
</body>
</html>
