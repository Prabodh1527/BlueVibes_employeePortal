<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVibes | Reset Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --navy-950: #070b14;
            --navy-900: #0d1424;
            --navy-800: #131c33;
            --cyan-400: #22d3ee;
            --blue-500: #3b82f6;
            --slate-300: #a8b4c8;
            --slate-500: #6b7a94;
            --white: #f4f7fb;
            --success: #4ade80;
            --error: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--navy-950);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 24px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 22% 20%, rgba(59, 130, 246, 0.16), transparent 45%),
                radial-gradient(circle at 80% 75%, rgba(34, 211, 238, 0.12), transparent 50%),
                var(--navy-950);
            z-index: 0;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 100%);
            z-index: 0;
        }

        .auth-card {
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, rgba(19, 28, 51, 0.9), rgba(13, 20, 36, 0.92));
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 2.75rem 2.5rem 2.25rem;
            border-radius: 20px;
            box-shadow:
                0 30px 60px -20px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.25rem;
        }
        .ring {
            position: absolute;
            top: -18px;
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 1px solid rgba(34, 211, 238, 0.35);
            animation: pulse 2.6s ease-out infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(0.85); opacity: 0.7; }
            70%  { transform: scale(1.35); opacity: 0; }
            100% { transform: scale(1.35); opacity: 0; }
        }
        .logo-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.92);
            padding: 4px;
        }
        .logo-divider {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--slate-500);
        }

        h2 {
            font-family: 'Sora', sans-serif;
            color: var(--white);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 0.6rem;
        }

        p {
            color: var(--slate-300);
            font-size: 0.88rem;
            margin-bottom: 1.75rem;
            line-height: 1.55;
        }

        .form-group { text-align: left; margin-bottom: 1.5rem; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: var(--slate-300);
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-500);
            font-size: 1.05rem;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--white);
            font-family: inherit;
            font-size: 0.92rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        input::placeholder { color: var(--slate-500); }
        input:focus {
            outline: none;
            border-color: var(--cyan-400);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        .btn-reset {
            width: 100%;
            background: linear-gradient(135deg, var(--cyan-400), var(--blue-500));
            color: #06111f;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.94rem;
            cursor: pointer;
            transition: transform 0.15s ease, filter 0.15s ease;
            box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.5);
            margin-bottom: 1.25rem;
        }
        .btn-reset:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .btn-reset:active { transform: translateY(0); }
        .btn-reset:focus-visible {
            outline: 2px solid var(--cyan-400);
            outline-offset: 2px;
        }

        .back-link {
            font-size: 0.85rem;
            color: var(--slate-300);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: color 0.2s ease;
        }
        .back-link:hover { color: var(--cyan-400); }

        /* Message Banner Styling */
        .msg {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
            line-height: 1.45;
        }

        .msg-success {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            display: block;
            border-left: 3px solid var(--success);
        }

        .msg-error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--error);
            display: block;
            border-left: 3px solid var(--error);
        }

        @media (prefers-reduced-motion: reduce) {
            .auth-card, .ring { animation: none; }
        }

        @media (max-width: 480px) {
            .auth-card { padding: 2.25rem 1.5rem 2rem; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-container">
        <div class="ring"></div>
        <img src="logo1.jpeg" class="logo-img" alt="Blueeye">
        <span class="logo-divider"></span>
        <img src="logo.jpeg" class="logo-img" alt="Bluegital">
    </div>

    <h2>Forgot Password?</h2>
    <p>Enter your official BlueVibes email and we'll send a temporary link to your active workspace inbox.</p>

    <div id="statusMsg" class="msg"></div>

    <form action="ForgotPasswordServlet" method="POST">
        <div class="form-group">
            <label>Official Email Address</label>
            <div class="input-wrapper">
                <i class="ph ph-envelope-simple"></i>
                <input type="email" id="email" name="email" placeholder="name@bluevibes.com" required>
            </div>
        </div>
        <button type="submit" class="btn-reset">Send Temporary Password</button>
    </form>

    <a href="index.html" class="back-link">
        <i class="ph ph-arrow-left"></i> Back to Login
    </a>
</div>

<script>
    // Reads URL parameter flags sent by backend redirects (e.g., ?status=success, ?status=error, ?status=domain_blocked)
    const params = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('statusMsg');
    const status = params.get('status');

    if (status === 'success') {
        msgBox.innerText = "Check your inbox! A secure password recovery link has been sent to your email.";
        msgBox.className = 'msg msg-success';
    } else if (status === 'domain_blocked') {
        msgBox.innerText = "Please use your official BlueVibes email address to reset your password.";
        msgBox.className = 'msg msg-error';
    } else if (status === 'error') {
        msgBox.innerText = "We couldn't find an account with that email. Please try again.";
        msgBox.className = 'msg msg-error';
    }
</script>

</body>
</html>
