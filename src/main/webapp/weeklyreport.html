<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVibes Employee Portal - Weekly Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📊 Weekly Status Reports Dashboard</h2>
            <div>
                <button class="btn btn-success btn-success">📤 Export and Email Report</button>
                <a href="index.html" class="btn btn-danger">Logout</a>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-bordered" id="taskTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Task ID</th>
                            <th>Description</th>
                            <th>Customer/Project</th>
                            <th>Status</th>
                            <th>% Done</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Comments</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr>
                            <td>TASK-101</td>
                            <td>Configured production mailing router microservice integration</td>
                            <td>BlueVibes Corporate</td>
                            <td>Completed</td>
                            <td>100</td>
                            <td>2026-06-10</td>
                            <td>2026-06-15</td>
                            <td>Pushed to production successfully via Brevo relay.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
    document.querySelector('.btn-success').addEventListener('click', function(e) {
        e.preventDefault(); 
        
        var table = document.getElementById("taskTable");
        if (!table) {
            alert("Error: The data table target could not be localized on screen.");
            return;
        }
        
        // 1. Pack the table into an Excel binary workbook structure
        var wb = XLSX.utils.table_to_book(table, {sheet: "Weekly Status"});
        var wbout = XLSX.write(wb, {bookType: 'xlsx', type: 'binary'});
        
        // 2. Buffer array translation conversion
        function s2ab(s) {
            var buf = new ArrayBuffer(s.length);
            var view = new Uint8Array(buf);
            for (var i = 0; i < s.length; i++) {
                view[i] = s.charCodeAt(i) & 0xFF;
            }
            return buf;
        }
        
        var blob = new Blob([s2ab(wbout)], {type: "application/octet-stream"});
        
        // 3. Package the payload parameters
        var formData = new FormData();
        formData.append("file", blob, "Weekly_Status_Report.xlsx");
        
        // 4. Hit the servlet with AJAX fetch pipeline
        fetch('WeeklyReportServlet?action=exportEmail', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert("✨ Excel Report generated and emailed successfully to you and the Auditor!");
            } else {
                alert("⚠️ Failed to distribute report emails: " + (data.message || "Unknown Error"));
            }
        })
        .catch(error => {
            console.error("Transmission breakdown:", error);
            alert("❌ Error connecting to backend server routing pipeline.");
        });
    });
    </script>
</body>
</html>
