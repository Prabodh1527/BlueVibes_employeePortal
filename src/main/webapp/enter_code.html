<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueVibes | Core Security Code Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --primary: #0f172a; --accent: #0284c7; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 1.5rem; }
        .logo-img { width: 60px; height: 60px; object-fit: contain; }
        h2 { color: var(--primary); font-weight: 700; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }
        .form-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        
        /* Verification PIN styling */
        input.pin-input { width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; transition: 0.2s; text-align: center; font-size: 1.2rem; font-weight: bold; letter-spacing: 4px; }
        input.pin-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
        
        /* Password fields styling */
        input.pass-input { width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-family: inherit; transition: 0.2s; text-align: left; font-size: 1rem; letter-spacing: 0; }
        input.pass-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 0.5rem; }
        .btn-submit:hover { background: var(--accent); }
        
        /* Banner Messages Alerts */
        .msg { padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; text-align: left; line-height: 1.4; }
        .msg-success { background: #dcfce7; color: #166534; display: block; border-left: 4px solid #16a34a; }
        .msg-error { background: #fee2e2; color: #991b1b; display: block; border-left: 4px solid #dc2626; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-container">
        <img src="logo1.jpeg" class="logo-img" alt="Blueeye">
        <img src="logo.jpeg" class="logo-img" alt="Bluegital">
    </div>
    
    <h2>Security Code Verification</h2>
    <p>Please paste the 6-digit login access PIN sent directly to your corporate inbox profile layout configuration.</p>

    <div id="banner" class="msg"></div>

    <form action="UpdatePasswordServlet" method="POST" onsubmit="return validatePasswords()">
        <div class="form-group">
            <label>6-Digit Verification PIN</label>
            <div class="input-wrapper">
                <i class="ph ph-key"></i>
                <input type="text" name="token" class="pin-input" placeholder="000000" maxlength="6" required>
            </div>
        </div>

        <div class="form-group">
            <label>Set New Password</label>
            <div class="input-wrapper">
                <i class="ph ph-lock-simple"></i>
                <input type="password" id="newPassword" name="password" class="pass-input" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <div class="input-wrapper">
                <i class="ph ph-shield-check"></i>
                <input type="password" id="confirmPassword" class="pass-input" placeholder="••••••••" required>
                <div id="passwordRules" style="margin-top:15px;text-align:left;font-size:13px;">
                <div id="ruleLengthMin" style="color:#dc2626;">✖ Minimum 7 characters</div>
                <div id="ruleLengthMax" style="color:#dc2626;">✖ Maximum 15 characters</div>
                <div id="ruleUpper" style="color:#dc2626;">✖ One uppercase letter</div>
                <div id="ruleNumber" style="color:#dc2626;">✖ One number</div>
                <div id="ruleSpecial" style="color:#dc2626;">✖ One special character</div>
                <div id="ruleMatch" style="color:#dc2626;">✖ Passwords match</div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">Confirm and Verify Account</button>
    </form>
</div>

<script>
    // Handle redirect alerts from the backend update servlet
    const params = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('banner');
    const status = params.get('status');
    
    if (status === 'code_sent') {
        msgBox.innerText = "Dispatch Confirmation: A 6-digit dynamic numeric entry key has been dropped into your corporate workspace inbox.";
        msgBox.className = "msg msg-success";
    } else if (status === 'wrong_code') {
        msgBox.innerText = "Verification Failed: The 6-digit PIN entered is incorrect or expired. Please check your mail and try again.";
        msgBox.className = "msg msg-error";
    } else if (status === 'invalid_input') {
        msgBox.innerText = "Input Error: Please fill out both the verification code and your new password fields fully.";
        msgBox.className = "msg msg-error";
    } else if (status === 'error' || status === 'system_error') {
        msgBox.innerText = "A processing error occurred. Please request a new temporary code sequence.";
        msgBox.className = "msg msg-error";
    }

    const newPasswordField = document.getElementById("newPassword");
    const confirmPasswordField = document.getElementById("confirmPassword");
    
    function checkPasswordRules() {
    
        const password = newPasswordField.value;
        const confirmPassword = confirmPasswordField.value;
    
        const minLength = password.length >= 7;
        const maxLength = password.length <= 15;
        const upperCase = /[A-Z]/.test(password);
        const number = /\d/.test(password);
        const special = /[^A-Za-z0-9]/.test(password);
        const match = password !== "" && password === confirmPassword;
    
        updateRule("ruleLengthMin", minLength);
        updateRule("ruleLengthMax", maxLength);
        updateRule("ruleUpper", upperCase);
        updateRule("ruleNumber", number);
        updateRule("ruleSpecial", special);
        updateRule("ruleMatch", match);
    }
    
    function updateRule(id, passed) {
    
        const element = document.getElementById(id);
    
        if (passed) {
            element.style.color = "#16a34a";
            element.innerHTML = element.innerHTML.replace("✖", "✔");
        } else {
            element.style.color = "#dc2626";
            element.innerHTML = element.innerHTML.replace("✔", "✖");
        }
    }
    
    newPasswordField.addEventListener("input", checkPasswordRules);
    confirmPasswordField.addEventListener("input", checkPasswordRules);

    // Client-side confirmation guard validation
    /*function validatePasswords() {
        const p1 = document.getElementById('newPassword').value;
        const p2 = document.getElementById('confirmPassword').value;
        
        if (p1 !== p2) {
            msgBox.innerText = "Validation Failed: Password entries do not match.";
            msgBox.className = "msg msg-error";
            return false;
        }
        return true;
    }*/
    function validatePasswords() {

        const p1 = document.getElementById('newPassword').value;
        const p2 = document.getElementById('confirmPassword').value;
    
        const valid =
            p1.length >= 7 &&
            p1.length <= 15 &&
            /[A-Z]/.test(p1) &&
            /\d/.test(p1) &&
            /[^A-Za-z0-9]/.test(p1) &&
            p1 === p2;
    
        if (!valid) {
    
            msgBox.innerText =
                "Password must be 7-15 characters long and contain at least 1 uppercase letter, 1 number, 1 special character and both passwords must match.";
    
            msgBox.className = "msg msg-error";
    
            return false;
        }
    
        return true;
    }
</script>

</body>
</html>
